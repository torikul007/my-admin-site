<!DOCTYPE html>
<html>
<head>
  <title>Login System</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(120deg,#4f46e5,#06b6d4);
      height: 100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .box {
      background:white;
      padding:25px;
      border-radius:12px;
      width:300px;
    }

    input {
      width:100%;
      padding:10px;
      margin:8px 0;
    }

    button {
      width:100%;
      padding:10px;
      background:#4f46e5;
      color:white;
      border:none;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Continue</button>
</div>

<script src="app.js"></script>

</body>
</html>
