<!DOCTYPE html>
<html>
<head>
  <title>Pro Login System</title>
  <style>
    body{
      font-family: Arial;
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .box{
      background:white;
      padding:25px;
      border-radius:10px;
      width:320px;
    }
    input{
      width:100%;
      padding:10px;
      margin:8px 0;
    }
    button{
      width:100%;
      padding:10px;
      background:#2563eb;
      color:white;
      border:none;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login System (Pro)</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Continue</button>
</div>

<script src="app.js"></script>
</body>
</html>
