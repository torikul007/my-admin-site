<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
</head>
<body>

<h2>Welcome User</h2>
<p id="info"></p>

<script>
  const role = localStorage.getItem("role");
  const user = localStorage.getItem("user");

  if (!user) {
    window.location.href = "index.html";
  }

  document.getElementById("info").innerText =
    "Logged in as: " + user + " (" + role + ")";
</script>

</body>
</html>
